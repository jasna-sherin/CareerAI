<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Error — CareerAI</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    .error-card {
      max-width: 560px;
      margin: 0 auto;
      text-align: center;
      padding: 56px 40px;
    }
    .error-icon { font-size: 4rem; margin-bottom: 16px; }
    .error-card h2 {
      font-family: var(--font-display);
      font-size: 2rem;
      color: var(--danger);
      margin-bottom: 14px;
    }
    .error-msg {
      background: rgba(239,68,68,.06);
      border: 1px solid rgba(239,68,68,.2);
      border-radius: var(--radius-sm);
      padding: 14px 18px;
      margin: 16px 0 28px;
      text-align: left;
      font-size: .9rem;
      color: var(--text-mid);
      font-family: monospace;
      word-break: break-word;
      line-height: 1.6;
    }
    .error-card p { color: var(--muted); margin-bottom: 24px; }
  </style>
</head>
<body>
<div class="page-wrapper" style="display:flex; align-items:center; justify-content:center; min-height:100vh">
  <div class="card error-card animate-fade-up">
    <div class="error-icon">⚠️</div>
    <h2>Something Went Wrong</h2>
    <p>We encountered an error while processing your request.</p>
    <div class="error-msg">{{ error }}</div>
    <div class="btn-group btn-group--center">
      <a href="/" class="btn btn--primary">← Back to Home</a>
      <button onclick="history.back()" class="btn btn--outline">↩ Try Again</button>
    </div>
  </div>
</div>
</body>
</html>
